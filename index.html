<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperdimensional Museum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --pop-shadow: 4px 4px 0px 0px #000000;
        --pop-border: 3px solid #000000;
      }
      
      body {
          margin: 0;
          padding: 0;
          background-color: #FCD34D; /* Yellow-300 */
          background-image: radial-gradient(#F59E0B 2px, transparent 2px);
          background-size: 20px 20px;
          overflow: hidden;
          font-family: 'Fredoka', sans-serif;
      }

      /* Pop Art Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #fff;
        border-left: 3px solid black;
      }
      ::-webkit-scrollbar-thumb {
        background: #F472B6; /* Pink */
        border: 3px solid black;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #EC4899;
      }

      /* Chunky Range Slider Styling */
      input[type=range] {
        -webkit-appearance: none; 
        background: transparent; 
        cursor: pointer;
        width: 100%;
        margin: 10px 0;
      }
      
      /* Track */
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 12px;
        background: #fff;
        border: 3px solid black;
        border-radius: 99px;
        box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
      }
      
      /* Thumb */
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 24px;
        width: 24px;
        border-radius: 50%;
        background: #A3E635; /* Lime */
        border: 3px solid black;
        margin-top: -9px; /* centers thumb */
        box-shadow: 1px 1px 0px 0px rgba(0,0,0,1);
        transition: transform 0.1s;
      }

      input[type=range]:hover::-webkit-slider-thumb {
        transform: scale(1.1);
      }

      /* Checkbox Styling */
      input[type=checkbox] {
        appearance: none;
        width: 24px;
        height: 24px;
        border: 3px solid black;
        border-radius: 6px;
        background-color: white;
        cursor: pointer;
        position: relative;
        box-shadow: 2px 2px 0px 0px black;
      }
      input[type=checkbox]:checked {
        background-color: #38BDF8; /* Sky Blue */
      }
      input[type=checkbox]:checked::after {
        content: '✓';
        position: absolute;
        color: black;
        font-weight: 900;
        font-size: 16px;
        left: 3px;
        top: -2px;
      }

    </style>
